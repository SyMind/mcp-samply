name: Publish npm

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      version:
        description: Package version to publish, for example 0.1.0
        required: true
        type: string

concurrency:
  group: publish-npm-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Verify requested version matches package version
        if: github.event_name == 'workflow_dispatch'
        run: |
          package_version="$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version")"
          requested_version="${{ github.event.inputs.version }}"

          if [ "$package_version" != "$requested_version" ]; then
            echo "::error::package.json version ($package_version) does not match requested version ($requested_version)"
            exit 1
          fi

      - name: Verify release tag matches package version
        if: github.event_name == 'release'
        run: |
          package_version="$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version")"
          release_tag="${GITHUB_REF_NAME#v}"

          if [ "$package_version" != "$release_tag" ]; then
            echo "::error::package.json version ($package_version) does not match release tag ($release_tag)"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Run build and tests
        run: npm run check

      - name: Preview publish contents
        run: npm pack --dry-run

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
